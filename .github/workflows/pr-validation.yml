name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate FieldSight Africa PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dependencies = data.get("project", {}).get("dependencies", [])
          if dependencies:
              subprocess.check_call([sys.executable, "-m", "pip", "install", *dependencies])
          else:
              print("No project dependencies listed in pyproject.toml")
          PY

      - name: Run all phase validations
        run: python scripts/validate_all_phases.py

      - name: Compile core application modules
        run: python -m compileall app.py models.py routes scripts intelligence_insights.py

      - name: Check diff whitespace
        run: git diff --check origin/${{ github.base_ref }}...HEAD
