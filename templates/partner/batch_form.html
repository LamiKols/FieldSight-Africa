{% extends "base.html" %}

{% block title %}New Partner Batch - FieldSight Africa{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <a href="{{ url_for('partner.batches') }}" class="text-primary hover:underline text-sm">&larr; Back to Batches</a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">New Draft Batch</h1>

        <form method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" name="title" id="title" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <div>
                <label for="dataset_type" class="block text-sm font-medium text-gray-700 mb-1">Dataset Type</label>
                <select name="dataset_type" id="dataset_type" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent">
                    {% for dataset_type in dataset_types %}
                    <option value="{{ dataset_type }}" {% if dataset_type == 'actor_registry' %}selected{% endif %}>{{ dataset_type|replace('_', ' ')|title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="reporting_month" class="block text-sm font-medium text-gray-700 mb-1">Reporting Month</label>
                <input type="month" name="reporting_month" id="reporting_month"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <div>
                <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" id="notes" rows="4"
                          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
            </div>

            <button type="submit" class="w-full bg-primary text-white py-3 px-4 rounded-lg font-semibold hover:bg-secondary transition">
                Create Draft Batch
            </button>
        </form>
    </div>
</div>
{% endblock %}
